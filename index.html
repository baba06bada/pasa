        /* ===== DİĞER MEVCUT STİLLER (KISALTILMIŞ) ===== */
        .notification { position: fixed; top: 20px; right: 20px; background: #ffffff; color: #24292f; padding: 16px 24px; border-radius: 6px; box-shadow: 0 8px 16px rgba(31, 35, 40, 0.2); border: 1px solid #d0d7de; z-index: 2000; animation: slideIn 0.3s ease-out; max-width: 400px; }
        .notification.success { border-left: 4px solid #1a7f37; }
        .notification.error { border-left: 4px solid #cf222e; }
        .notification.info { border-left: 4px solid #0969da; }
        .notification.warning { border-left: 4px solid #bf8700; }
        .notification.hiding { animation: slideOut 0.3s ease-in; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(400px); opacity: 0; } }
        h1 { font-size: 24px; font-weight: 700; margin: 0; }

        input:focus, select:focus { outline: none; border-color: #0969da; box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.1); }

        header { background: white; border-bottom: 1px solid #d0d7de; padding: 16px 24px; box-shadow: 0 1px 0 rgba(31, 35, 40, 0.04); }
        .header-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .header-buttons { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; background: #f6f8fa; color: #24292f; border: 1px solid #d0d7de; }

        .tab.active { background: #0969da; color: white; }
        .tab.inactive { background: white; color: #57606a; border-color: #d0d7de; }
        .tab.inactive:hover { background: #f6f8fa; }
        .container { display: flex; flex-direction: column; height: calc(100vh - 160px); }

        .sidebar-section { padding: 16px; border-bottom: 1px solid #d0d7de; background: white; }
        .channels-list { flex: 1; overflow-y: auto; padding: 16px; }
        .channel-item { background: white; border-radius: 6px; padding: 16px; margin-bottom: 8px; border: 1px solid #d0d7de; cursor: pointer; transition: all 0.15s; }
        .channel-item:hover { background: #f6f8fa; transform: translateY(-1px); box-shadow: 0 3px 8px rgba(31, 35, 40, 0.12); }

</head>

    <!-- Ayarlar Modalı (Tema seçimi eklendi) -->

        <div class="modal-content" style="max-width:600px;">
            <h2>⚙️ Ayarlar</h2>
            <div style="margin-bottom:20px;">
                <h3>🎨 Tema Seçimi</h3>
                <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;">
                    <span class="theme-option" style="background:#0969da;" data-theme="default" onclick="applyTheme('default')" title="Varsayılan (Mavi)"></span>
                    <span class="theme-option" style="background:#1a1a2e;" data-theme="dark" onclick="applyTheme('dark')" title="Koyu"></span>
                    <span class="theme-option" style="background:#e67e22;" data-theme="orange" onclick="applyTheme('orange')" title="Turuncu"></span>
                    <span class="theme-option" style="background:#27ae60;" data-theme="green" onclick="applyTheme('green')" title="Yeşil"></span>
                    <span class="theme-option" style="background:#e74c3c;" data-theme="red" onclick="applyTheme('red')" title="Kırmızı"></span>
                    <span class="theme-option" style="background:#8e44ad;" data-theme="purple" onclick="applyTheme('purple')" title="Mor"></span>
                </div>
            </div>
            <div style="text-align:right;">
                <button class="btn btn-secondary" onclick="closeSettingsModal()">Kapat</button>
            </div>
        </div>
    </div>

    <script>
        // ------------------------------------------------
        // ES5 Uyumlu, LG Kumanda Desteği, HLS.js v0.14.17
        // TEMA SEÇENEKLİ SÜRÜM - FİLM/DİZİ ÇALIŞIR
        // ------------------------------------------------

        // ----- TEMA FONKSİYONLARI (GLOBAL) -----
        function applyTheme(themeName) {
            var themes = ['default', 'dark', 'orange', 'green', 'red', 'purple'];
            for (var i = 0; i < themes.length; i++) {
                document.body.classList.remove('theme-' + themes[i]);
            }
            if (themeName !== 'default') {
                document.body.classList.add('theme-' + themeName);
            }
            try { localStorage.setItem('iptv_theme', themeName); } catch(e) {}
            var options = document.querySelectorAll('.theme-option');
            for (var j = 0; j < options.length; j++) {
                var btnTheme = options[j].getAttribute('data-theme');
                options[j].classList.toggle('active', btnTheme === themeName);
            }
            closeSettingsModal();
        }

        function loadTheme() {
            var saved = null;
            try { saved = localStorage.getItem('iptv_theme'); } catch(e) {}
            if (saved) {
                applyTheme(saved);
            } else {
                document.body.classList.remove('theme-dark', 'theme-orange', 'theme-green', 'theme-red', 'theme-purple');
                var options = document.querySelectorAll('.theme-option');
                for (var i = 0; i < options.length; i++) {
                    options[i].classList.toggle('active', options[i].getAttribute('data-theme') === 'default');
                }
            }
        }

        function openSettingsModal() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        // ----- app nesnesi (aynı, sadece tema fonksiyonları eklendi) -----
        var app = {};

        // ----- Yardımcı fonksiyonlar (ES5) -----
        function httpRequest(method, url, callback, errback) {
            var xhr = new XMLHttpRequest();
            xhr.open(method, url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        callback(xhr.responseText);
                    } else {
                        if (errback) errback(xhr.statusText);
                        else console.error('HTTP Error:', xhr.statusText);
                    }
                }
            };
            xhr.onerror = function() {
                if (errback) errback('Network Error');
                else console.error('Network Error');
            };
            xhr.send();
        }

        function httpRequestJson(method, url, callback, errback) {
            httpRequest(method, url, function(text) {
                try {
                    var data = JSON.parse(text);
                    callback(data);
                } catch (e) {
                    if (errback) errback('JSON Parse Error: ' + e.message);
                    else console.error('JSON Parse Error:', e);
                }
            }, errback);
        }

        // Basit şifreleme (sadece base64 + _pass kontrolü)
        function encryptData(text, password) {
            var obj = {
                _pass: btoa(password),
                data: btoa(text)
            };
            return btoa(JSON.stringify(obj));
        }

        function decryptData(encryptedBase64, password) {
            var json = JSON.parse(atob(encryptedBase64));
            if (json._pass && atob(json._pass) === password) {
                return atob(json.data);
            } else {
                throw new Error('Yanlış şifre');
            }
        }

        // ----- URLSearchParams yedeği (manuel parse) -----
        function getQueryParams() {
            var search = window.location.search.substring(1);
            var params = {};
            if (search) {
                var pairs = search.split('&');
                for (var i = 0; i < pairs.length; i++) {
                    var pair = pairs[i].split('=');
                    if (pair.length === 2) {
                        params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1]);
                    }
                }
            }
            return params;
        }

        // ----- app nesnesi -----
        app.state = {
            creds: null,
            userInfo: null,
            type: 'live',
            allChannels: [],
            channels: [],
            displayed: [],
            categories: [],
            favorites: [],
            category: 'all',
            search: '',
            cache: {},
            catCache: {},
            page: 0,
            pageSize: 50,
            hls: null,
            panels: [],
            selectedPanelId: null,
            pendingConfig: null
        };

        app.init = function() {
            this.loadFavorites();
            this.loadPanels();
            this.cleanPanels();
            this.checkUrl();
            this.bindEvents();
            this.renderPanelList();
            this.bindRemoteKeys();
            loadTheme();
        };

        app.bindRemoteKeys = function() {
            var self = this;
            document.addEventListener('keydown', function(e) {
                var key = e.keyCode || e.which;
                if (key === 27 || key === 8) {
                    var activeModal = document.querySelector('.modal.active');
                    if (activeModal) {
                        var id = activeModal.id;
                        if (id === 'loginModal') return;
                        self.closeModal(id);
                        e.preventDefault();
                        e.stopPropagation();
                        return;
                    }
                }
                var list = document.getElementById('channelsList');
                var focused = list ? list.querySelector('.channel-item.focused') : null;
                if (key === 40) {
                    e.preventDefault();
                    if (focused) {
                        var next = focused.nextElementSibling;
                        while (next && !next.classList.contains('channel-item')) next = next.nextElementSibling;
                        if (next) {
                            focused.classList.remove('focused');
                            next.classList.add('focused');
                            next.scrollIntoView({ block: 'nearest' });
                        }
                    } else {
                        var first = list ? list.querySelector('.channel-item') : null;
                        if (first) first.classList.add('focused');
                    }
                } else if (key === 38) {
                    e.preventDefault();
                    if (focused) {
                        var prev = focused.previousElementSibling;
                        while (prev && !prev.classList.contains('channel-item')) prev = prev.previousElementSibling;
                        if (prev) {
                            focused.classList.remove('focused');
                            prev.classList.add('focused');
                            prev.scrollIntoView({ block: 'nearest' });
                        }
                    } else {
                        var last = list ? list.querySelector('.channel-item:last-child') : null;
                        if (last) last.classList.add('focused');
                    }
                } else if (key === 13) {
                    e.preventDefault();
                    if (focused) {
                        focused.click();
                    } else {
                        var activeEl = document.activeElement;
                        if (activeEl && activeEl.click) activeEl.click();
                    }
                }
            });
        };

        app.bindEvents = function() {
            var self = this;

            document.getElementById('newPanelBtn').addEventListener('click', function() { self.newPanel(); });
            document.getElementById('connectBtn').addEventListener('click', function() { self.connectPanel(); });
            document.getElementById('savePanelBtn').addEventListener('click', function() { self.savePanel(); });
            document.getElementById('deletePanelBtn').addEventListener('click', function() { self.deletePanel(); });

            document.getElementById('passwordForm').addEventListener('submit', function(e) {
                e.preventDefault();
                self.decrypt(e);
            });

            document.getElementById('logoutBtn').addEventListener('click', function() { self.logout(); });

            document.getElementById('shareBtn').addEventListener('click', function() { self.showShare(); });
            document.getElementById('generateBtn').addEventListener('click', function() { self.generateUrl(); });
            document.getElementById('closeShare').addEventListener('click', function() { self.closeModal('shareModal'); });
            document.getElementById('copyBtn').addEventListener('click', function() { self.copyUrl(); });
            document.getElementById('testBtn').addEventListener('click', function() { self.testUrl(); });
            document.getElementById('backBtn').addEventListener('click', function() { self.resetShare(); });

            document.getElementById('favBtn').addEventListener('click', function() { self.showFavorites(); });
            document.getElementById('closeFav').addEventListener('click', function() { self.closeModal('favModal'); });

            document.getElementById('closeEpisodes').addEventListener('click', function() { self.closeModal('episodesModal'); });

            document.getElementById('searchInput').addEventListener('input', function(e) {
                self.handleSearch(e.target.value);
            });
            document.getElementById('categorySelect').addEventListener('change', function(e) {
                self.changeCategory(e.target.value);
            });

            // Ayarlar butonu (sidebar'da mevcut olmalı)
            var settingsBtn = document.getElementById('sm-settings');
            if (settingsBtn) {
                settingsBtn.addEventListener('click', function() {
                    openSettingsModal();
                });
            }

            var tabs = document.querySelectorAll('.tab');
            for (var i = 0; i < tabs.length; i++) {
                (function(btn) {
                    btn.addEventListener('click', function() {
                        self.switchType(btn.dataset.type);
                    });
                })(tabs[i]);
            }

            document.getElementById('channelsList').addEventListener('scroll', function() {
                self.handleScroll();
            });
        };

        app.closeModal = function(id) {
            document.getElementById(id).classList.remove('active');
        };

        // ----- Diğer mevcut fonksiyonlar (kısaltıldı, aynı mantık) -----
        app.cleanPanels = function() {
            var changed = false;
            var panels = [];
            for (var i = 0; i < this.state.panels.length; i++) {
                var p = this.state.panels[i];
                var url = (p.serverUrl || '').toLowerCase();
                var name = (p.name || '').toLowerCase();
                if (url.indexOf('amazingiptv1.one') === -1 && name !== 'tekno' && name !== 'tt') {
                    panels.push(p);
                } else {
                    changed = true;
                }
            }
            if (changed) {
                this.state.panels = panels;
                this.savePanels();
                this.notify('🔧 İstenmeyen paneller temizlendi.', 'info');
            }
        };

        app.loadPanels = function() {
            try {
                var data = localStorage.getItem('iptv_panels');
                this.state.panels = data ? JSON.parse(data) : [];
                if (!Array.isArray(this.state.panels)) this.state.panels = [];
            } catch (e) {
                console.warn('Panel verileri okunamadı, sıfırlanıyor.', e);
                this.state.panels = [];
                localStorage.removeItem('iptv_panels');
            }
        };

        app.savePanels = function() {
            try {
                localStorage.setItem('iptv_panels', JSON.stringify(this.state.panels));
            } catch (e) {
                console.error('Paneller kaydedilemedi:', e);
                this.notify('❌ Paneller kaydedilemedi.', 'error');
            }
        };

        app.renderPanelList = function() {
            var container = document.getElementById('panelListContainer');
            if (!container) return;
            var self = this;
            if (this.state.panels.length === 0) {
                container.innerHTML = '<div class="text-small" style="padding: 12px; color: #57606a;">Henüz panel eklenmemiş.</div>';
                return;
            }
            var html = '';
            for (var i = 0; i < this.state.panels.length; i++) {
                var p = this.state.panels[i];
                var active = (p.id === this.state.selectedPanelId) ? 'active' : '';
                var name = p.name || p.serverUrl.replace(/^https?:\/\//, '');
                html += '<div class="panel-item ' + active + '" data-id="' + p.id + '">' + this.escape(name) + '</div>';
            }
            container.innerHTML = html;

            var items = container.querySelectorAll('.panel-item');
            for (var j = 0; j < items.length; j++) {
                (function(el) {
                    el.addEventListener('click', function() {
                        self.selectPanel(el.dataset.id);
                    });
                })(items[j]);
            }
        };

        app.selectPanel = function(id) {
            this.state.selectedPanelId = id;
            var panel = null;
            for (var i = 0; i < this.state.panels.length; i++) {
                if (this.state.panels[i].id === id) {
                    panel = this.state.panels[i];
                    break;
                }
            }
            if (panel) {
                document.getElementById('panelName').value = panel.name || '';
                document.getElementById('panelServerUrl').value = panel.serverUrl;
                document.getElementById('panelUsername').value = panel.username;
                document.getElementById('panelPassword').value = panel.password;
                document.getElementById('savePanelBtn').textContent = 'Güncelle';
                document.getElementById('deletePanelBtn').disabled = false;
            } else {
                this.newPanel();
                this.notify('⚠️ Panel bulunamadı, yeni panel oluşturabilirsiniz.', 'warning');
            }
            this.renderPanelList();
        };

        app.newPanel = function() {
            this.state.selectedPanelId = null;
            document.getElementById('panelName').value = '';
            document.getElementById('panelServerUrl').value = '';
            document.getElementById('panelUsername').value = '';
            document.getElementById('panelPassword').value = '';
            document.getElementById('savePanelBtn').textContent = 'Ekle';
            document.getElementById('deletePanelBtn').disabled = true;
            this.renderPanelList();
        };

        app.savePanel = function() {
            var name = document.getElementById('panelName').value.trim();
            var serverUrl = document.getElementById('panelServerUrl').value.trim();
            var username = document.getElementById('panelUsername').value.trim();
            var password = document.getElementById('panelPassword').value.trim();

            if (!serverUrl || !username || !password) {
                this.notify('⚠️ Lütfen tüm zorunlu alanları doldurun.', 'warning');
                return;
            }

            try {
                if (this.state.selectedPanelId) {
                    var panel = null;
                    for (var i = 0; i < this.state.panels.length; i++) {
                        if (this.state.panels[i].id === this.state.selectedPanelId) {
                            panel = this.state.panels[i];
                            break;
                        }
                    }
                    if (panel) {
                        panel.name = name;
                        panel.serverUrl = serverUrl;
                        panel.username = username;
                        panel.password = password;
                        this.savePanels();
                        this.notify('✅ Panel güncellendi.', 'success');
                    } else {
                        this.notify('⚠️ Güncellenecek panel bulunamadı.', 'error');
                        return;
                    }
                } else {
                    var newPanel = {
                        id: Date.now() + '-' + Math.random().toString(36).substr(2, 6),
                        name: name,
                        serverUrl: serverUrl,
                        username: username,
                        password: password
                    };
                    this.state.panels.push(newPanel);
                    this.savePanels();
                    this.state.selectedPanelId = newPanel.id;
                    this.notify('✅ Yeni panel eklendi.', 'success');
                }
                this.renderPanelList();
                var current = null;
                for (var j = 0; j < this.state.panels.length; j++) {
                    if (this.state.panels[j].id === this.state.selectedPanelId) {
                        current = this.state.panels[j];
                        break;
                    }
                }
                if (current) {
                    document.getElementById('panelName').value = current.name || '';
                    document.getElementById('panelServerUrl').value = current.serverUrl;
                    document.getElementById('panelUsername').value = current.username;
                    document.getElementById('panelPassword').value = current.password;
                    document.getElementById('savePanelBtn').textContent = 'Güncelle';
                    document.getElementById('deletePanelBtn').disabled = false;
                }
            } catch (e) {
                console.error('Panel kaydedilirken hata:', e);
                this.notify('❌ Panel kaydedilemedi: ' + e.message, 'error');
            }
        };

        app.deletePanel = function() {
            if (!this.state.selectedPanelId) {
                this.notify('⚠️ Silmek için bir panel seçin.', 'warning');
                return;
            }
            if (!confirm('Bu paneli silmek istediğinize emin misiniz?')) return;
            try {
                var newPanels = [];
                for (var i = 0; i < this.state.panels.length; i++) {
                    if (this.state.panels[i].id !== this.state.selectedPanelId) {
                        newPanels.push(this.state.panels[i]);
                    }
                }
                this.state.panels = newPanels;
                this.savePanels();
                this.state.selectedPanelId = null;
                this.newPanel();
                this.renderPanelList();
                this.notify('🗑️ Panel silindi.', 'info');
            } catch (e) {
                console.error('Panel silinirken hata:', e);
                this.notify('❌ Panel silinemedi.', 'error');
            }
        };

        app.connectPanel = function() {
            var serverUrl = document.getElementById('panelServerUrl').value.trim();
            var username = document.getElementById('panelUsername').value.trim();
            var password = document.getElementById('panelPassword').value.trim();
            if (!serverUrl || !username || !password) {
                this.notify('⚠️ Lütfen tüm alanları doldurun.', 'warning');
                return;
            }
            this.doLogin({ serverUrl: serverUrl, username: username, password: password });
        };

        app.doLogin = function(creds) {
            var self = this;
            this.state.creds = creds;
            try {
                this.notify('🔄 IPTV sunucusuna bağlanılıyor...', 'info');
                var url = this.buildUrl('player_api.php');
                httpRequestJson('GET', url, function(data) {
                    if (data.user_info && data.user_info.auth === 1) {
                        self.state.userInfo = data.user_info;
                        self.loadApp();
                        self.notify('✅ Bağlantı başarılı!', 'success');
                        self.closeModal('loginModal');
                    } else {
                        throw new Error('Geçersiz kimlik bilgileri');
                    }
                }, function(err) {
                    self.notify('❌ Bağlantı başarısız! Kimlik bilgilerinizi kontrol edin.', 'error');
                    self.state.creds = null;
                    self.state.userInfo = null;
                });
            } catch (error) {
                this.notify('❌ Bağlantı başarısız! ' + error.message, 'error');
                this.state.creds = null;
                this.state.userInfo = null;
            }
        };

        app.checkUrl = function() {
            var params = getQueryParams();
            var config = params.config;
            if (config) {
                this.state.pendingConfig = decodeURIComponent(config);
                this.closeModal('loginModal');
                document.getElementById('passwordModal').classList.add('active');
            }
        };

        app.decrypt = function(e) {
            e.preventDefault();
            var self = this;
            var password = document.getElementById('decryptPassword').value;
            try {
                this.notify('🔓 Yapılandırma şifresi çözülüyor...', 'info');
                var config = null;
                try {
                    var decoded = JSON.parse(atob(this.state.pendingConfig));
                    if (decoded._pass) {
                        if (atob(decoded._pass) === password) {
                            delete decoded._pass;
                            config = decoded;
                        } else {
                            throw new Error('Yanlış şifre');
                        }
                    } else {
                        var decrypted = decryptData(this.state.pendingConfig, password);
                        config = JSON.parse(decrypted);
                    }
                } catch (err) {
                    var decrypted2 = decryptData(this.state.pendingConfig, password);
                    config = JSON.parse(decrypted2);
                }

                this.state.creds = config.credentials;
                this.state.favorites = config.favorites || [];
                this.saveFavorites();

                var url = this.buildUrl('player_api.php');
                httpRequestJson('GET', url, function(data) {
                    if (data.user_info && data.user_info.auth === 1) {
                        self.state.userInfo = data.user_info;
                    }
                    self.closeModal('passwordModal');
                    self.loadApp();
                    self.notify('✅ Yapılandırma başarıyla yüklendi!', 'success');
                    try {
                        if (location.protocol !== 'file:') {
                            history.replaceState({}, '', location.pathname);
                        }
                    } catch (err) {}
                }, function(err) {
                    self.closeModal('passwordModal');
                    self.loadApp();
                    self.notify('✅ Yapılandırma yüklendi (kullanıcı bilgisi alınamadı)', 'info');
                });

            } catch (error) {
                console.error('Şifre çözme hatası:', error);
                this.notify('❌ Yanlış şifre! Lütfen tekrar deneyin.', 'error');
                document.getElementById('decryptPassword').value = '';
            }
        };

        app.loadApp = function() {
            this.closeModal('loginModal');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userInfo').textContent = '👤 ' + this.state.creds.username;
            this.displayExpiry();
            this.updateFavCount();
            this.loadCategories();
            this.loadChannels();
        };

        app.displayExpiry = function() {
            var expiryEl = document.getElementById('expiryInfo');
            if (!this.state.userInfo || !this.state.userInfo.exp_date) {
                expiryEl.classList.add('hidden');
                return;
            }
            var expTimestamp = parseInt(this.state.userInfo.exp_date);
            if (!expTimestamp || expTimestamp === 0) {
                expiryEl.textContent = '📅 Süresiz';
                expiryEl.classList.remove('hidden');
                return;
            }
            var expDate = new Date(expTimestamp * 1000);
            var now = new Date();
            var daysLeft = Math.ceil((expDate - now) / (1000 * 60 * 60 * 24));
            var day = expDate.getDate();
            var month = expDate.toLocaleDateString('tr-TR', { month: 'short' });
            var year = expDate.getFullYear();
            var dateStr = day + ' ' + month + ' ' + year;
            if (daysLeft < 0) {
                expiryEl.textContent = '📅 Süresi doldu';
                expiryEl.className = 'badge badge-danger';
            } else if (daysLeft <= 7) {
                expiryEl.textContent = '📅 ' + daysLeft + ' gün sonra sona eriyor (' + dateStr + ')';
                expiryEl.className = 'badge badge-warning';
            } else {
                expiryEl.textContent = '📅 Geçerlilik tarihi ' + dateStr;
                expiryEl.className = 'badge badge-primary';
            }
            expiryEl.classList.remove('hidden');
        };

        app.loadCategories = function() {
            var self = this;
            var key = this.state.type;
            if (this.state.catCache[key]) {
                this.state.categories = this.state.catCache[key];
                this.renderCategories();
                return;
            }
            var actions = { live: 'get_live_categories', movies: 'get_vod_categories', series: 'get_series_categories' };
            try {
                this.notify('📂 Kategoriler yükleniyor...', 'info');
                var url = this.buildUrl('player_api.php', 'action=' + actions[this.state.type]);
                httpRequestJson('GET', url, function(data) {
                    self.state.categories = Array.isArray(data) ? data : [];
                    self.state.catCache[key] = self.state.categories;
                    self.renderCategories();
                }, function(err) {
                    self.state.categories = [];
                    self.notify('⚠️ Kategoriler yüklenemedi', 'warning');
                });
            } catch (error) {
                this.state.categories = [];
                this.notify('⚠️ Kategoriler yüklenemedi', 'warning');
            }
        };

        app.loadChannels = function() {
            var self = this;
            var key = this.state.type + '_' + this.state.category;
            if (this.state.cache[key]) {
                this.state.allChannels = this.state.cache[key];
                this.state.channels = this.state.allChannels.slice(0);
                this.resetPage();
                this.renderCategories();
                this.renderChannels();
                return;
            }
            var actions = { live: 'get_live_streams', movies: 'get_vod_streams', series: 'get_series' };
            try {
                this.showSkeleton();
                this.notify('📺 Kanallar yükleniyor...', 'info');
                var params = 'action=' + actions[this.state.type];
                if (this.state.category !== 'all') params += '&category_id=' + this.state.category;
                var url = this.buildUrl('player_api.php', params);
                httpRequestJson('GET', url, function(data) {
                    self.state.allChannels = Array.isArray(data) ? data : [];
                    self.state.channels = self.state.allChannels.slice(0);
                    self.state.cache[key] = self.state.allChannels;
                    self.resetPage();
                    self.renderCategories();
                    self.renderChannels();
                    self.notify('✅ ' + self.state.allChannels.length + ' kanal yüklendi', 'success');
                }, function(err) {
                    document.getElementById('channelsList').innerHTML = '<div class="text-center text-small">Kanallar yüklenemedi</div>';
                    self.notify('❌ Kanallar yüklenemedi', 'error');
                });
            } catch (error) {
                document.getElementById('channelsList').innerHTML = '<div class="text-center text-small">Kanallar yüklenemedi</div>';
                this.notify('❌ Kanallar yüklenemedi', 'error');
            }
        };

        app.renderCategories = function() {
            var select = document.getElementById('categorySelect');
            var html = '<option value="all">Tüm Kategoriler (' + this.state.allChannels.length + ')</option>';
            for (var i = 0; i < this.state.categories.length; i++) {
                var c = this.state.categories[i];
                html += '<option value="' + c.category_id + '">' + this.escape(c.category_name) + '</option>';
            }
            select.innerHTML = html;
            select.value = this.state.category;
        };

        app.resetPage = function() {
            this.state.page = 0;
            this.state.displayed = [];
        };

        app.renderChannels = function() {
            var self = this;
            var start = this.state.page * this.state.pageSize;
            var end = start + this.state.pageSize;
            var page = this.state.channels.slice(start, end);

            if (this.state.page === 0) this.state.displayed = [];
            this.state.displayed = this.state.displayed.concat(page);

            var container = document.getElementById('channelsList');
            var resultEl = document.getElementById('resultCount');

            if (this.state.displayed.length === 0) {
                container.innerHTML = '<div class="text-center text-small">Kanal bulunamadı</div>';
                resultEl.classList.add('hidden');
                return;
            }

            if (this.state.search) {
                resultEl.textContent = '"' + this.state.search + '" için ' + this.state.channels.length + ' kanal bulundu';
                resultEl.classList.remove('hidden');
            } else {
                resultEl.classList.add('hidden');
            }

            var html = '';
            for (var i = 0; i < this.state.displayed.length; i++) {
                var ch = this.state.displayed[i];
                var name = this.escape(ch.name || ch.title || 'Bilinmiyor');
                var isFav = (this.state.favorites.indexOf(this.getId(ch)) !== -1);
                var streamType = ch.stream_type || '';
                if (streamType.toLowerCase() === 'live') streamType = 'Canlı';
                var chJson = JSON.stringify(ch).replace(/'/g, '&apos;');
                html += '<div class="channel-item" data-channel=\'' + chJson + '\'>' +
                    '<div class="channel-header">' +
                    '<div class="channel-info">' +
                    '<div class="channel-name">' + name + '</div>' +
                    (streamType ? '<span class="badge">' + streamType + '</span>' : '') +
                    '</div>' +
                    '<button class="fav-btn ' + (isFav ? 'active' : 'inactive') + '" data-id="' + this.getId(ch) + '">' +
                    (isFav ? '★' : '☆') +
                    '</button>' +
                    '</div>' +
                    '</div>';
            }

            var hasMore = this.state.displayed.length < this.state.channels.length;
            if (hasMore) {
                html += '<button class="load-more">Daha Fazla Yükle (' + (this.state.channels.length - this.state.displayed.length) + ' kaldı)</button>';
            }

            container.innerHTML = html;

            var items = container.querySelectorAll('.channel-item');
            for (var j = 0; j < items.length; j++) {
                (function(item) {
                    item.addEventListener('click', function() {
                        var ch = JSON.parse(item.dataset.channel);
                        if (self.state.type === 'series') {
                            self.showEpisodes(ch);
                        } else {
                            self.play(ch);
                        }
                    });
                })(items[j]);
            }

            var favBtns = container.querySelectorAll('.fav-btn');
            for (var k = 0; k < favBtns.length; k++) {
                (function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        self.toggleFav(btn.dataset.id);
                    });
                })(favBtns[k]);
            }

            if (hasMore) {
                container.querySelector('.load-more').addEventListener('click', function() {
                    self.state.page++;
                    self.renderChannels();
                });
            }
        };

        app.handleScroll = function() {
            var el = document.getElementById('channelsList');
            if ((el.scrollTop + el.clientHeight) / el.scrollHeight > 0.8) {
                var btn = el.querySelector('.load-more');
                if (btn) btn.click();
            }
        };

        app.showSkeleton = function() {
            var html = '';
            for (var i = 0; i < 5; i++) {
                html += '<div class="channel-item">' +
                    '<div class="skeleton h-8 w-75 mb-2"></div>' +
                    '<div class="skeleton h-8 w-25"></div>' +
                    '</div>';
            }
            document.getElementById('channelsList').innerHTML = html;
        };

        // ----- DİZİ BÖLÜMLERİ (modal düzeltilmiş) -----
        app.showEpisodes = function(series) {
            var self = this;
            try {
                this.notify('📺 Bölümler yükleniyor...', 'info');
                var url = this.buildUrl('player_api.php', 'action=get_series_info&series_id=' + series.series_id);
                httpRequestJson('GET', url, function(data) {
                    try {
                        document.getElementById('seriesTitle').textContent = series.name || series.title;
                        var list = document.getElementById('episodesList');
                        list.innerHTML = '';

                        var episodesData = data.episodes;
                        var seasonsData = data.seasons || data.Seasons || data.season || data.Season;

                        if (!episodesData && seasonsData && Array.isArray(seasonsData)) {
                            var collected = {};
                            for (var si = 0; si < seasonsData.length; si++) {
                                var season = seasonsData[si];
                                var seasonNum = season.season_number || season.number || season.id || (si + 1);
                                var eps = season.episodes || season.Episodes || season.episode || season.data;
                                if (eps && Array.isArray(eps)) {
                                    collected[seasonNum] = eps;
                                }
                            }
                            if (Object.keys(collected).length > 0) {
                                episodesData = collected;
                            }
                        }

                        var seasonsMap = {};
                        var hasEpisodes = false;

                        if (episodesData) {
                            if (Array.isArray(episodesData)) {
                                for (var j = 0; j < episodesData.length; j++) {
                                    var ep = episodesData[j];
                                    var seasonNum = ep.season || ep.season_number || ep.season_no || 1;
                                    if (!seasonsMap[seasonNum]) {
                                        seasonsMap[seasonNum] = [];
                                    }
                                    seasonsMap[seasonNum].push(ep);
                                }
                                hasEpisodes = true;
                            } else if (typeof episodesData === 'object') {
                                for (var seasonKey in episodesData) {
                                    if (episodesData.hasOwnProperty(seasonKey)) {
                                        var val = episodesData[seasonKey];
                                        if (Array.isArray(val) && val.length > 0) {
                                            seasonsMap[seasonKey] = val;
                                            hasEpisodes = true;
                                        }
                                    }
                                }
                            }
                        }

                        if (!hasEpisodes) {
                            list.innerHTML = '<div class="text-center text-small" style="padding:40px;color:#888;">⚠️ Bu dizi için bölüm bilgisi bulunamadı.</div>';
                            self.notify('⚠️ Bölüm verisi yok.', 'warning');
                            document.getElementById('episodesModal').classList.add('active');
                            return;
                        }

                        var seasonNumbers = [];
                        for (var s in seasonsMap) {
                            if (seasonsMap.hasOwnProperty(s)) {
                                seasonNumbers.push(s);
                            }
                        }
                        seasonNumbers.sort(function(a, b) { return parseInt(a, 10) - parseInt(b, 10); });

                        var html = '';
                        for (var si2 = 0; si2 < seasonNumbers.length; si2++) {
                            var seasonNum = seasonNumbers[si2];
                            var eps = seasonsMap[seasonNum];
                            html += '<div class="season-header">📺 Sezon ' + seasonNum + ' (' + eps.length + ' bölüm)</div>';
                            eps.sort(function(a, b) {
                                var numA = a.episode_num || a.episode_number || a.num || a.id || 0;
                                var numB = b.episode_num || b.episode_number || b.num || b.id || 0;
                                return parseInt(numA, 10) - parseInt(numB, 10);
                            });
                            for (var ei = 0; ei < eps.length; ei++) {
                                var ep = eps[ei];
                                var epNum = ep.episode_num || ep.episode_number || ep.num || ep.id || (ei + 1);
                                var title = ep.title || ep.name || ep.episode_name || 'Bölüm ' + epNum;
                                var epJson = JSON.stringify(ep).replace(/'/g, '&apos;');
                                var seriesJson = JSON.stringify(series).replace(/'/g, '&apos;');
                                html += '<div class="episode-item" data-ep=\'' + epJson + '\' data-series=\'' + seriesJson + '\'>' +
                                    '<h3>🎬 Bölüm ' + epNum + ': ' + self.escape(title) + '</h3>' +
                                    '</div>';
                            }
                        }

                        list.innerHTML = html;
                        self.notify('✅ ' + seasonNumbers.length + ' sezon yüklendi', 'success');

                        var epItems = list.querySelectorAll('.episode-item');
                        for (var i = 0; i < epItems.length; i++) {
                            (function(item) {
                                item.addEventListener('click', function() {
                                    try {
                                        var ep = JSON.parse(item.dataset.ep);
                                        var ser = JSON.parse(item.dataset.series);
                                        self.playEpisode(ep, ser);
                                        self.closeModal('episodesModal');
                                    } catch (e) {
                                        console.error('Bölüm tıklama hatası:', e);
                                        self.notify('Bölüm oynatma hatası: ' + e.message, 'error');
                                    }
                                });
                            })(epItems[i]);
                        }

                        document.getElementById('episodesModal').classList.add('active');

                    } catch (e) {
                        console.error('Bölüm işleme hatası:', e);
                        document.getElementById('episodesList').innerHTML = '<div class="text-center text-small" style="padding:40px;color:#cf222e;">❌ Bölüm işleme hatası: ' + e.message + '</div>';
                        self.notify('❌ Bölüm işleme hatası: ' + e.message, 'error');
                        document.getElementById('episodesModal').classList.add('active');
                    }
                }, function(err) {
                    console.error('Bölüm yükleme hatası:', err);
                    document.getElementById('episodesList').innerHTML = '<div class="text-center text-small" style="padding:40px;color:#cf222e;">❌ Bölümler yüklenemedi: ' + err + '</div>';
                    self.notify('❌ Bölümler yüklenemedi: ' + err, 'error');
                    document.getElementById('episodesModal').classList.add('active');
                });
            } catch (error) {
                console.error('showEpisodes hatası:', error);
                this.notify('❌ Bölümler yüklenemedi: ' + error.message, 'error');
                document.getElementById('episodesModal').classList.add('active');
            }
        };

        app.playEpisode = function(ep, series) {
            var serverUrl = this.state.creds.serverUrl;
            var username = this.state.creds.username;
            var password = this.state.creds.password;
            var ext = ep.container_extension || 'mp4';
            var url = serverUrl + '/series/' + username + '/' + password + '/' + ep.id + '.' + ext;
            this.playStream(url, series.name + ' - S' + ep.season + 'E' + ep.episode_num, series.category_id);
        };

        app.play = function(ch) {
            var serverUrl = this.state.creds.serverUrl;
            var username = this.state.creds.username;
            var password = this.state.creds.password;
            var type = this.state.type;
            var url = '';
            if (type === 'live') {
                url = serverUrl + '/live/' + username + '/' + password + '/' + ch.stream_id + '.m3u8';
            } else if (type === 'movies') {
                var ext = ch.container_extension || 'mp4';
                url = serverUrl + '/movie/' + username + '/' + password + '/' + ch.stream_id + '.' + ext;
            }
            this.playStream(url, ch.name || ch.title, ch.category_id);
        };

        app.playStream = function(url, name, catId) {
            var player = document.getElementById('player');
            var placeholder = document.getElementById('placeholder');
            var info = document.getElementById('videoInfo');

            if (this.state.hls) {
                this.state.hls.destroy();
                this.state.hls = null;
            }

            player.pause();
            player.src = '';
            player.load();

            player.classList.remove('hidden');
            placeholder.classList.add('hidden');
            info.classList.remove('hidden');

            document.getElementById('channelName').textContent = name;
            document.getElementById('channelCat').textContent = this.getCatName(catId);

            this.notify('📺 Oynatılıyor: ' + name, 'info');

            var self = this;
            setTimeout(function() {
                if (url.indexOf('.m3u8') !== -1) {
                    if (Hls && Hls.isSupported()) {
                        self.state.hls = new Hls({ enableWorker: true, lowLatencyMode: true });
                        self.state.hls.loadSource(url);
                        self.state.hls.attachMedia(player);
                        self.state.hls.on(Hls.Events.MANIFEST_PARSED, function() {
                            player.play()['catch'](function() { self.notify('❌ Oynatma başarısız', 'error'); });
                        });
                        self.state.hls.on(Hls.Events.ERROR, function(e, data) {
                            if (data.fatal) self.notify('❌ Akış hatası oluştu', 'error');
                        });
                    } else {
                        self.notify('❌ HLS desteklenmiyor', 'error');
                    }
                } else {
                    player.src = url;
                    player.load();
                    player.play()['catch'](function() { self.notify('❌ Oynatma başarısız', 'error'); });
                }
            }, 100);
        };

        app.getCatName = function(id) {
            for (var i = 0; i < this.state.categories.length; i++) {
                if (this.state.categories[i].category_id == id) {
                    return this.state.categories[i].category_name;
                }
            }
            return 'Bilinmiyor';
        };

        app.getId = function(ch) {
            return String(ch.stream_id || ch.series_id || ch.num || Math.random());
        };

        app.toggleFav = function(id) {
            var idx = this.state.favorites.indexOf(id);
            if (idx !== -1) {
                this.state.favorites.splice(idx, 1);
                this.notify('⭐ Favorilerden çıkarıldı', 'info');
            } else {
                this.state.favorites.push(id);
                this.notify('⭐ Favorilere eklendi', 'success');
            }
            this.saveFavorites();
            this.updateFavCount();
            this.renderChannels();
        };

        app.updateFavCount = function() {
            document.getElementById('favCount').textContent = this.state.favorites.length;
        };

        app.saveFavorites = function() {
            localStorage.setItem('iptv_fav', JSON.stringify(this.state.favorites));
        };

        app.loadFavorites = function() {
            var saved = localStorage.getItem('iptv_fav');
            if (saved) {
                try {
                    this.state.favorites = JSON.parse(saved);
                    if (!Array.isArray(this.state.favorites)) this.state.favorites = [];
                } catch (e) {
                    this.state.favorites = [];
                }
            } else {
                this.state.favorites = [];
            }
        };

        app.showFavorites = function() {
            var self = this;
            var favs = [];
            for (var i = 0; i < this.state.allChannels.length; i++) {
                var ch = this.state.allChannels[i];
                if (this.state.favorites.indexOf(this.getId(ch)) !== -1) {
                    favs.push(ch);
                }
            }
            var list = document.getElementById('favList');
            if (favs.length === 0) {
                list.innerHTML = '<div class="text-center text-small">Henüz favori yok<br><br>Eklemek için kanalları yıldızlayın</div>';
            } else {
                var html = '';
                for (var j = 0; j < favs.length; j++) {
                    var ch = favs[j];
                    var name = this.escape(ch.name || ch.title || 'Bilinmiyor');
                    var chJson = JSON.stringify(ch).replace(/'/g, '&apos;');
                    html += '<div class="channel-item" data-ch=\'' + chJson + '\'>' +
                        '<h3 class="channel-name">' + name + '</h3>' +
                        '<span class="badge badge-success">⭐ Favori</span>' +
                        '</div>';
                }
                list.innerHTML = html;

                var items = list.querySelectorAll('.channel-item');
                for (var k = 0; k < items.length; k++) {
                    (function(item) {
                        item.addEventListener('click', function() {
                            var ch = JSON.parse(item.dataset.ch);
                            if (self.state.type === 'series') {
                                self.showEpisodes(ch);
                            } else {
                                self.play(ch);
                            }
                            self.closeModal('favModal');
                        });
                    })(items[k]);
                }
            }
            document.getElementById('favModal').classList.add('active');
            this.notify('⭐ ' + favs.length + ' favori kanal gösteriliyor', 'info');
        };

        // ----- Paylaşım -----
        app.showShare = function() {
            this.resetShare();
            document.getElementById('shareModal').classList.add('active');
        };

        app.resetShare = function() {
            document.getElementById('shareStep1').classList.remove('hidden');
            document.getElementById('shareStep2').classList.add('hidden');
            document.getElementById('sharePassword').value = '';
        };

        app.generateUrl = function() {
            var self = this;
            var password = document.getElementById('sharePassword').value;
            if (!password || password.length < 4) {
                this.notify('⚠️ Parola en az 4 karakter olmalıdır', 'warning');
                return;
            }
            try {
                this.notify('🔒 Şifreli URL oluşturuluyor...', 'info');

                var baseUrl = '';
                if (location.protocol === 'file:') {
                    baseUrl = location.href.split('?')[0];
                } else {
                    baseUrl = location.origin + location.pathname;
                }

                var config = {
                    credentials: this.state.creds,
                    favorites: this.state.favorites
                };
                var encrypted = encryptData(JSON.stringify(config), password);
                var url = baseUrl + '?config=' + encodeURIComponent(encrypted);

                document.getElementById('shareUrl').textContent = url;
                document.getElementById('sharePass').textContent = password;
                document.getElementById('shareStep1').classList.add('hidden');
                document.getElementById('shareStep2').classList.remove('hidden');
                this.notify('✅ Şifreli URL başarıyla oluşturuldu!', 'success');
            } catch (error) {
                console.error('URL oluşturma hatası:', error);
                this.notify('❌ URL oluşturulamadı: ' + error.message, 'error');
            }
        };

        app.copyUrl = function() {
            var url = document.getElementById('shareUrl').textContent;
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url)['catch'](function() { self.fallbackCopy(url); });
                } else {
                    this.fallbackCopy(url);
                }
                this.notify('✅ URL panoya kopyalandı!', 'success');
            } catch (error) {
                console.error('Kopyalama hatası:', error);
                this.notify('❌ URL kopyalanamadı. Lütfen manuel kopyalayın.', 'error');
            }
        };

        app.fallbackCopy = function(text) {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        };

        app.testUrl = function() {
            var url = document.getElementById('shareUrl').textContent;
            window.open(url, '_blank');
            this.notify('🔗 URL yeni sekmede açılıyor...', 'info');
        };

        // ----- Diğer -----
        app.switchType = function(type) {
            this.state.type = type;
            this.state.category = 'all';
            this.state.search = '';
            document.getElementById('searchInput').value = '';

            var tabs = document.querySelectorAll('.tab');
            for (var i = 0; i < tabs.length; i++) {
                var btn = tabs[i];
                if (btn.dataset.type === type) {
                    btn.classList.remove('inactive');
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                    btn.classList.add('inactive');
                }
            }

            this.notify('📺 ' + (type === 'live' ? 'Canlı TV' : type === 'movies' ? 'Filmler' : 'Diziler') + "'e geçiliyor...", 'info');
            this.loadCategories();
            this.loadChannels();
        };

        app.changeCategory = function(cat) {
            this.state.category = cat;
            this.notify('📂 Kategori yükleniyor...', 'info');
            this.loadChannels();
        };

        app.handleSearch = function(query) {
            this.state.search = query.trim();
            if (this.state.search) {
                var results = [];
                for (var i = 0; i < this.state.allChannels.length; i++) {
                    var c = this.state.allChannels[i];
                    var name = (c.name || c.title || '').toLowerCase();
                    if (name.indexOf(this.state.search.toLowerCase()) !== -1) {
                        results.push(c);
                    }
                }
                this.state.channels = results;
                this.notify('🔍 ' + this.state.allChannels.length + ' kanal aranıyor...', 'info');
            } else {
                this.state.channels = this.state.allChannels.slice(0);
            }
            this.resetPage();
            this.renderChannels();
        };

        app.buildUrl = function(endpoint, params) {
            var creds = this.state.creds;
            var base = 'username=' + encodeURIComponent(creds.username) + '&password=' + encodeURIComponent(creds.password);
            var all = params ? base + '&' + params : base;
            return creds.serverUrl + '/' + endpoint + '?' + all;
        };

        app.logout = function() {
            this.state.creds = null;
            this.state.userInfo = null;
            this.state.channels = [];
            this.state.allChannels = [];
            this.state.categories = [];
            this.state.cache = {};
            if (this.state.hls) {
                this.state.hls.destroy();
                this.state.hls = null;
            }
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('player').src = '';
            this.notify('👋 Başarıyla çıkış yapıldı', 'info');
            this.renderPanelList();
        };

        app.notify = function(msg, type) {
            type = type || 'info';
            var div = document.createElement('div');
            div.className = 'notification ' + type;
            div.textContent = msg;
            document.getElementById('notifications').appendChild(div);
            var self = this;
            setTimeout(function() {
                div.classList.add('hiding');
                setTimeout(function() { div.remove(); }, 300);
            }, 3500);
        };

        app.escape = function(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        };

        // ----- Başlat -----
        document.addEventListener('DOMContentLoaded', function() {
            app.init();
            // Ayarlar butonu yoksa manuel ekle (sidebar'a)
            var sidebarMenu = document.getElementById('sidebarMenu');
            if (sidebarMenu) {
                var settingsItem = document.createElement('div');
                settingsItem.className = 'sidebar-item';
                settingsItem.id = 'sm-settings';
                settingsItem.tabIndex = 0;
                settingsItem.innerHTML = '⚙️ Ayarlar';
                settingsItem.onclick = function() { openSettingsModal(); };
                sidebarMenu.appendChild(settingsItem);
            }
            loadTheme();
        });
    </script>
</body>
</html>
